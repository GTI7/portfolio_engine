import_transactions:
  name: Import transactions
  description: >-
    Parse a broker export file and report what it contains (read, imported,
    duplicates, rejected) against a portfolio's current transaction log.
    Does NOT write to transactions.yaml automatically - review the report,
    then add the transactions yourself. See docs/user/BROKER_IMPORT.md.
  fields:
    portfolio:
      name: Portfolio
      description: >-
        The portfolio ID to import into (the folder name under your
        investments path, e.g. "demo_portfolio").
      required: true
      example: demo_portfolio
      selector:
        text:
    provider:
      name: Provider
      description: Which broker export format the file is in.
      required: true
      example: generic_csv
      selector:
        select:
          options:
            - label: Generic CSV
              value: generic_csv
            - label: Interactive Brokers Flex Query (XML)
              value: ibkr_flex_query
    file_path:
      name: File path
      description: >-
        Path to the export file, relative to your Home Assistant config
        directory (e.g. "imports/ibkr_export.xml").
      required: true
      example: imports/broker_export.csv
      selector:
        text:

export_portfolio_data:
  name: Export portfolio data
  description: >-
    Write a single JSON backup file containing a portfolio's holdings,
    full transaction history, snapshot history, and last import report.
    Writes to the exact path you specify - never overwrites
    transactions.yaml or any file this integration already manages.
  fields:
    portfolio:
      name: Portfolio
      description: The portfolio ID to export (the folder name under your investments path).
      required: true
      example: demo_portfolio
      selector:
        text:
    output_path:
      name: Output file path
      description: >-
        Where to write the backup file, relative to your Home Assistant
        config directory (e.g. "backups/demo_portfolio_2026-07-10.json").
        Parent folders are created automatically if they don't exist.
      required: true
      example: backups/demo_portfolio_backup.json
      selector:
        text:

search_assets:
  name: Search assets
  description: >-
    Search Yahoo Finance by company/fund name or partial ticker and return
    candidate matches (ticker, display name, exchange, currency, asset
    type). Pure discovery - never reads or writes any portfolio file.
  fields:
    query:
      name: Query
      description: Free-text search - a company/fund name or partial ticker.
      required: true
      example: Vanguard FTSE All-World
      selector:
        text:
    limit:
      name: Limit
      description: Maximum number of matches to return (1-25).
      required: false
      example: 10
      selector:
        number:
          min: 1
          max: 25
          mode: box

apply_import:
  name: Apply import
  description: >-
    Write the currently pending import_transactions report's imported
    (non-duplicate) rows to transactions.yaml. All-or-nothing - fails if
    there is no pending report for this portfolio, and clears the report
    once applied, so calling this twice in a row without a fresh
    import_transactions call fails clearly instead of double-appending.
  fields:
    portfolio:
      name: Portfolio
      description: >-
        The portfolio ID to apply the pending report for (the folder name
        under your investments path, e.g. "demo_portfolio").
      required: true
      example: demo_portfolio
      selector:
        text:

create_portfolio:
  name: Create portfolio
  description: >-
    Create a brand-new portfolio under an already-configured investments
    path, optionally pre-populated with holdings. Never overwrites an
    existing portfolio - fails if one already exists at portfolio_id. To
    set up your very first portfolio (before any investments path is
    configured), use the guided setup step in the integration's Config
    Flow instead - this service is for adding portfolios after that.
  fields:
    investments_path:
      name: Investments path
      description: >-
        The investments path of an already-configured Portfolio Engine
        entry (must match exactly, including relative path).
      required: true
      example: investments
      selector:
        text:
    portfolio_id:
      name: Portfolio ID
      description: >-
        The new portfolio's folder name - this becomes its identity.
        Cosmetic naming lives in the separate "name" field.
      required: true
      example: new_portfolio
      selector:
        text:
    name:
      name: Display name
      description: >-
        A cosmetic, human-readable name - never used as an identifier.
      required: true
      example: New Portfolio
      selector:
        text:
    base_currency:
      name: Base currency
      description: The portfolio's base currency (defaults to EUR).
      required: false
      example: USD
      selector:
        text:
    cash_balance:
      name: Cash balance
      description: Starting cash balance (defaults to 0).
      required: false
      example: 1000.0
      selector:
        number:
          min: 0
          mode: box
    holdings:
      name: Holdings
      description: >-
        Optional list of starting holdings, each shaped like
        {symbol, shares, avg_price, currency, type, account}. Typically
        assembled from one or more prior search_assets calls.
      required: false
      example: >-
        [{"symbol": "AAPL", "shares": 10, "avg_price": 150.0,
        "currency": "USD", "type": "stock"}]
      selector:
        object:
