# Portfolio Engine — Official Dashboard Package
#
# A ready-to-import Lovelace dashboard exposing every Portfolio Engine
# entity, in six views: Overview, Holdings, Performance, Transactions,
# Analytics, Administration. Native Home Assistant card types throughout
# (entities, gauge, history-graph, statistics-graph) — markdown is used
# only where no native card can do the job: the Holdings/Transactions
# tables (no native card renders a table from a list-valued attribute),
# conditional administration/status text, and static explanatory text.
# No custom cards, no HACS dependency, no Dashboard Strategy, no frontend
# JavaScript.
#
# --- Configuration: one block, edited once per portfolio ------------------
#
# Every entity ID this file references is defined exactly once, as a YAML
# anchor (the "&name" markers below), inside the Overview view's four
# native `entities` cards. Every other native card in this file (every
# `gauge`, `history-graph`, `statistics-graph`, and the remaining
# `entities` cards) references those same anchors via alias ("*name") -
# it never repeats an entity ID. To point this file at your own portfolio,
# edit the seventeen anchor lines in the Overview view (search for "&" or
# just replace "demo_portfolio" with your portfolio's folder name
# throughout the Overview view) - every native card elsewhere in the file
# updates automatically once those seventeen lines are correct.
#
# YAML aliases only substitute a whole value, not a fragment inside a
# larger string - so the six markdown cards that need Jinja (the Holdings
# table, the Holdings view's best/worst-performer card, the Transactions
# table, and Administration's three status/detail cards) can't use the
# same aliases inside their content. Each of those six cards instead has
# its own single `{% set portfolio_id = 'demo_portfolio' %}` line at the
# very top of its template, clearly commented - edit those six lines too
# (or just find-and-replace "demo_portfolio" across the whole file in one
# pass, which correctly updates the anchors AND these six lines together,
# exactly like earlier versions of this file worked).
#
# This is a deliberate, disclosed tradeoff (see docs/adr/0019 and
# MILESTONE_13_DESIGN.md's "Option A vs Option B" discussion): a small,
# one-time, clearly-labeled edit, in exchange for every card in this
# dashboard being a real native Home Assistant card - full click-to-more-
# info, native theming, real gauges, real history/statistics charts -
# rather than markdown-simulated equivalents.
#
# Multiple portfolios: duplicate a view's cards for the second portfolio
# and give the copies their own anchors (e.g. `&value2` instead of
# `&value`) - anchor names must be unique within the file, but otherwise
# this is the same one-time edit repeated per portfolio, not an automatic
# add.
#
# --- How to import ---------------------------------------------------------
#
# 1. Settings -> Dashboards -> Add Dashboard -> "New dashboard from scratch".
# 2. Give it a name (e.g. "Portfolio"), then open it and click the
#    three-dot menu (top right) -> Edit Dashboard -> three-dot menu again
#    -> "Raw configuration editor".
# 3. Delete the placeholder content and paste this entire file's content,
#    after editing the Overview view's anchors and the six markdown
#    cards' `portfolio_id` lines for your own portfolio (see above).
# 4. Save.
#
# No entities beyond the seventeen Portfolio Engine already creates are
# referenced anywhere in this file. See docs/user/DASHBOARDS.md for a
# longer walkthrough and a worked example.

title: Portfolio
views:
  # ============================================================ Overview ===
  # "How am I doing, right now, across everything I own?" - also the
  # single configuration block: every entity ID used anywhere in this
  # file is anchored here, once, the first time it's needed.
  - title: Overview
    path: overview
    icon: mdi:view-dashboard
    cards:
      - type: entities
        title: At a Glance
        entities:
          - entity: &value sensor.demo_portfolio_value
          - entity: &invested sensor.demo_portfolio_total_invested
          - entity: &profit sensor.demo_portfolio_total_profit
          - entity: &roi sensor.demo_portfolio_roi
          - entity: &cash sensor.demo_portfolio_cash_balance
          - entity: &day_change sensor.demo_portfolio_day_change
            name: Today's Change
      - type: entities
        title: Returns
        entities:
          - entity: &mwr sensor.demo_portfolio_money_weighted_return
            name: Money-Weighted Return (XIRR)
          - entity: &twr sensor.demo_portfolio_time_weighted_return
            name: Time-Weighted Return (cumulative)
      - type: entities
        title: Status
        entities:
          - entity: &reconciliation sensor.demo_portfolio_reconciliation
          - entity: &positions sensor.demo_portfolio_positions
          - entity: &transaction_count sensor.demo_portfolio_transaction_count
      - type: history-graph
        title: Value Trend
        hours_to_show: 168
        entities:
          - entity: *value
      - type: entities
        title: Additional Metrics (reference — used by other views)
        entities:
          - entity: &dividend_income sensor.demo_portfolio_dividend_income
          - entity: &drawdown sensor.demo_portfolio_drawdown
          - entity: &volatility sensor.demo_portfolio_volatility
          - entity: &concentration sensor.demo_portfolio_concentration
          - entity: &last_import sensor.demo_portfolio_last_import
          - entity: &allocation sensor.demo_portfolio_allocation

  # ============================================================ Holdings ===
  # "What do I actually own, and how concentrated am I?"
  - title: Holdings
    path: holdings
    icon: mdi:chart-pie
    cards:
      - type: markdown
        title: Holdings
        content: >
          {% set portfolio_id = 'demo_portfolio' %}
          {% set positions = state_attr('sensor.' ~ portfolio_id ~ '_positions', 'positions') or [] %}

          | Symbol | Shares | Value | Gain % |
          |---|---|---|---|
          {% for p in positions %}
          | {{ p.holding.symbol }} | {{ p.holding.shares }} | {{ p.market_value_base | round(2) }} | {{ p.gain_pct | round(2) }}% |
          {% endfor %}
      - type: entities
        title: Allocation by Type
        entities:
          - entity: *allocation
            name: Largest Group
        # Milestone 13 Phase 2: shows the largest allocation group's share
        # of the portfolio (e.g. "stock", "Cash"). The full breakdown
        # across every group is available in this entity's own `allocation`
        # attribute (Developer Tools -> States) - not rendered as a table
        # here, to keep this addition minimal per that milestone's scope.
      - type: gauge
        entity: *concentration
        name: Largest Position (% of Portfolio)
        min: 0
        max: 100
        severity:
          green: 0
          yellow: 25
          red: 50
      - type: entities
        title: Concentration Detail
        entities:
          - type: attribute
            entity: *concentration
            attribute: top5_concentration_pct
            name: Top 5 concentration
            suffix: "%"
          - type: attribute
            entity: *concentration
            attribute: diversification_score
            name: Diversification score
            suffix: / 100
      - type: markdown
        title: Best / Worst Performer
        content: >
          {% set portfolio_id = 'demo_portfolio' %}
          {% set conc_e = 'sensor.' ~ portfolio_id ~ '_concentration' %}
          {% set largest = state_attr(conc_e, 'largest_position') %}
          {% set winner = state_attr(conc_e, 'largest_winner') %}
          {% set loser = state_attr(conc_e, 'largest_loser') %}

          - **Largest position:** {{ largest.symbol if largest else 'n/a' }}
            ({{ largest.pct_of_portfolio if largest else 0 }}% of portfolio)
          - **Best performer:** {{ winner.symbol if winner else 'n/a' }}
            ({{ winner.gain_pct if winner else 0 }}%)
          - **Worst performer:** {{ loser.symbol if loser else 'n/a' }}
            ({{ loser.gain_pct if loser else 0 }}%)

  # ========================================================== Performance ===
  # "How well is my money working, and by which measure?"
  - title: Performance
    path: performance
    icon: mdi:chart-line
    cards:
      - type: gauge
        entity: *roi
        name: ROI
        min: -50
        max: 50
        needle: true
        severity:
          red: -50
          yellow: 0
          green: 10
      - type: entities
        title: Return Metrics
        entities:
          - entity: *roi
            name: ROI (invested capital basis)
          - entity: *mwr
            name: Money-Weighted Return (XIRR)
          - entity: *twr
            name: Time-Weighted Return (cumulative)
          - type: attribute
            entity: *twr
            attribute: annualized_pct
            name: TWR Annualized (CAGR)
            suffix: "%"
          - type: attribute
            entity: *twr
            attribute: periods_used
            name: Snapshot periods used
        # A blank/"unknown" value for the two attribute rows above means
        # there isn't enough snapshot history yet for an annualized figure
        # - Portfolio Engine takes one snapshot per day, so this becomes
        # available once at least one prior day's snapshot exists.
      - type: statistics-graph
        title: ROI Trend
        days_to_show: 30
        entities:
          - *roi
      - type: markdown
        title: What These Numbers Mean
        content: >
          - **ROI** — simple return on invested capital, ignores timing.
          - **MWR (XIRR)** — annualized, sensitive to *when* and *how much*
            you deposited or withdrew — reflects your personal timing.
          - **TWR** — annualized (CAGR) and cumulative, with deposit/withdrawal
            timing removed — reflects the portfolio's own investment
            performance, independent of your cash-flow decisions.

          A `%` state of `unknown` means that metric doesn't have enough
          data yet (e.g. no transaction history for MWR, or fewer than two
          snapshots for TWR) — check each entity's `status` attribute for
          the specific reason.

  # ========================================================= Transactions ===
  # "What has actually happened in this account recently?"
  - title: Transactions
    path: transactions
    icon: mdi:swap-horizontal
    cards:
      - type: entities
        title: Summary
        entities:
          - entity: *transaction_count
      - type: markdown
        title: Recent Activity
        content: >
          {% set portfolio_id = 'demo_portfolio' %}
          {% set recent = state_attr('sensor.' ~ portfolio_id ~ '_transaction_count', 'recent') or [] %}

          | Date | Type | Symbol | Shares | Amount |
          |---|---|---|---|---|
          {% for t in recent %}
          | {{ as_timestamp(t.date) | timestamp_custom('%Y-%m-%d') }} | {{ t.type }} | {{ t.symbol or '-' }} | {{ t.shares or '-' }} | {{ t.amount }} {{ t.currency }} |
          {% endfor %}
        # Shows up to the 10 most recent transactions. For the full
        # history, edit your investments/<portfolio>/transactions.yaml
        # directly, or check Settings -> Devices & Services -> Portfolio
        # Engine -> Download Diagnostics for full-log statistics.

  # ============================================================ Analytics ===
  # "What income am I generating, and how much risk am I carrying?"
  - title: Analytics
    path: analytics
    icon: mdi:chart-bell-curve
    cards:
      - type: entities
        title: Income & Risk
        entities:
          - entity: *dividend_income
            name: Dividend Income (rolling 12mo)
          - entity: *drawdown
            name: Current Drawdown
          - entity: *volatility
            name: Volatility (annualized)
      - type: entities
        title: Dividend Detail
        entities:
          - type: attribute
            entity: *dividend_income
            attribute: lifetime
            name: Lifetime
            suffix: (portfolio currency)
          - type: attribute
            entity: *dividend_income
            attribute: current_year
            name: This year
            suffix: (portfolio currency)
          - type: attribute
            entity: *dividend_income
            attribute: dividend_yield_pct
            name: Yield
            suffix: "%"
          - type: attribute
            entity: *dividend_income
            attribute: average_monthly_dividend
            name: Average monthly
            suffix: (portfolio currency)
      - type: entities
        title: Drawdown Detail
        entities:
          - type: attribute
            entity: *drawdown
            attribute: maximum_drawdown_pct
            name: Maximum drawdown ever
            suffix: "%"
          - type: attribute
            entity: *drawdown
            attribute: peak_value
            name: Peak value
            suffix: (portfolio currency)
          - type: attribute
            entity: *drawdown
            attribute: recovery_status
            name: Recovery status

  # ====================================================== Administration ===
  # "Can I trust this data, and what do I do if I can't?"
  - title: Administration
    path: administration
    icon: mdi:cog
    cards:
      - type: entities
        title: Data Integrity
        entities:
          - entity: *reconciliation
      - type: markdown
        title: Reconciliation Discrepancies
        content: >
          {% set portfolio_id = 'demo_portfolio' %}
          {% set status = states('sensor.' ~ portfolio_id ~ '_reconciliation') %}
          {% if status == 'ok' %}
          ✅ No discrepancies — your declared holdings and cash balance
          match what your transaction log implies.
          {% elif status == 'no_data' %}
          ℹ️ No transaction history recorded yet, so nothing to check
          against. This is normal for a portfolio you haven't started
          logging transactions for.
          {% else %}
          {% for d in state_attr('sensor.' ~ portfolio_id ~ '_reconciliation', 'discrepancies') or [] %}
          - **{{ d.symbol or 'Cash balance' }}** ({{ d.field }}): declared
            {{ d.declared }}, transaction log implies {{ d.reconstructed }}
            (difference: {{ d.difference }})
          {% endfor %}
          {% endif %}
      - type: markdown
        title: Data Availability
        content: >
          {% set portfolio_id = 'demo_portfolio' %}
          {% set pos_e = 'sensor.' ~ portfolio_id ~ '_positions' %}
          {% set missing_quotes = state_attr(pos_e, 'symbols_missing_quotes') or [] %}
          {% set missing_fx = state_attr(pos_e, 'fx_rates_missing') or [] %}
          {% if not missing_quotes and not missing_fx %}
          ✅ All prices and exchange rates are current.
          {% else %}
          {% if missing_quotes %}
          ⚠️ **Missing quotes for:** {{ missing_quotes | join(', ') }}
          {% endif %}
          {% if missing_fx %}
          ⚠️ **Missing exchange rates for:** {{ missing_fx | join(', ') }}
          {% endif %}
          {% endif %}

          Check Settings → Devices & Services → Portfolio Engine → ⋮ →
          System, for any open Repair issues with more detail.
      - type: entities
        title: Last Import
        entities:
          - entity: *last_import
      - type: markdown
        title: Import Details
        content: >
          {% set portfolio_id = 'demo_portfolio' %}
          {% set imp_e = 'sensor.' ~ portfolio_id ~ '_last_import' %}
          {% set status = state_attr(imp_e, 'status') %}
          {% if status == 'never_imported' %}
          No import has been run yet for this portfolio. Use the
          `portfolio_engine.import_transactions` service (Developer Tools
          → Actions, or a script/automation) to import a broker export.
          See docs/user/BROKER_IMPORT.md for the exact steps.
          {% else %}
          - **Provider:** {{ state_attr(imp_e, 'provider') }}
          - **When:** {{ state_attr(imp_e, 'as_of') }}
          - **Read:** {{ state_attr(imp_e, 'transactions_read') }}
          - **Imported:** {{ state_attr(imp_e, 'imported') }}
          - **Duplicates:** {{ state_attr(imp_e, 'duplicates') }}
          - **Rejected:** {{ state_attr(imp_e, 'rejected') }}

          {% for w in state_attr(imp_e, 'warnings') or [] %}
          ⚠️ {{ w }}
          {% endfor %}

          **Reminder:** importing only produces a report — apply it with
          **Portfolio Engine: Apply import**, or copy rows into
          `transactions.yaml` by hand. See
          docs/user/PORTFOLIO_IMPORT_AND_SETUP.md.
          {% endif %}
      - type: markdown
        title: Backup
        content: >
          Run **Portfolio Engine: Export portfolio data** (Developer Tools
          → Actions) any time to write a complete JSON backup of this
          portfolio's holdings, transactions, and snapshot history to a
          file you choose. See docs/user/BACKUP_EXPORT.md — including how
          to schedule it automatically with a simple Home Assistant
          automation.
