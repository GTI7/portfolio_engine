name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fast-suite:
    name: Unit + integration (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-test.txt

      - run: pip install -r requirements.txt -r requirements-test.txt

      - run: pytest

  ha-harness:
    name: Real Home Assistant harness (tests_ha/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ha-test.txt

      - run: pip install -r requirements-ha-test.txt

      # The harness discovers custom integrations via a fixed
      # testing_config/custom_components/ directory bundled inside the
      # harness package itself (see MILESTONE_2_5.md's "How this works"
      # section) - same approach as scripts/setup_ha_test_env.sh, adapted
      # for a throwaway CI environment instead of a persistent local venv.
      - name: Register the integration with the HA test harness
        run: |
          HARNESS_DIR=$(python -c "import pytest_homeassistant_custom_component, os; print(os.path.join(os.path.dirname(pytest_homeassistant_custom_component.__file__), 'testing_config', 'custom_components'))")
          mkdir -p "$HARNESS_DIR"
          ln -s "$GITHUB_WORKSPACE/custom_components/portfolio_engine" "$HARNESS_DIR/portfolio_engine"

      - run: pytest tests_ha/ -v
